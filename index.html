<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GründerGPT – WhatsApp Template Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bl:#1a73e8;--bd:#0d47a1;--bl2:#e8f0fe;--gn:#1e8e3e;--gl:#e6f4ea;--or:#e8710a;--ol:#fce8d5;--pu:#9334e6;--pl:#f3e8fd;--rd:#d93025;--rl:#fce8e6;--gr:#5f6368;--gy:#f1f3f4;--tx:#202124;--mt:#5f6368;--bo:#dadce0;--bg:#f8f9fa;--wh:#fff;--ra:12px;--sid-w:300px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
.tb{background:var(--wh);border-bottom:1px solid var(--bo);padding:0 24px;height:64px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}.li{width:38px;height:38px;background:linear-gradient(135deg,var(--bl),var(--bd));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 8px rgba(26,115,232,.35)}.lt{font-size:16px;font-weight:800;color:var(--bl);letter-spacing:-.3px}.ls{font-size:10px;color:var(--mt);display:block;margin-top:-2px}
.sb{flex:1;max-width:520px;position:relative}.sb input{width:100%;height:40px;background:var(--bg);border:1.5px solid var(--bo);border-radius:24px;padding:0 40px 0 42px;font-size:13.5px;color:var(--tx);outline:none;font-family:inherit;transition:.2s}.sb input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(26,115,232,.12);background:var(--wh)}.sb input::placeholder{color:var(--mt)}.si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mt);font-size:15px;pointer-events:none}.sx{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mt);cursor:pointer;font-size:15px;display:none;line-height:1}.sx.v{display:block}
.tr{margin-left:auto;display:flex;gap:10px;align-items:center;flex-shrink:0}.chip{background:var(--bl2);color:var(--bl);border-radius:20px;padding:4px 12px;font-weight:700;font-size:12px}.ver{font-size:11px;color:var(--mt);white-space:nowrap}
.lay{display:flex;min-height:calc(100vh - 64px)}
.sid{width:var(--sid-w);flex-shrink:0;background:var(--wh);border-right:1px solid var(--bo);padding:10px 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}.sid::-webkit-scrollbar{width:3px}.sid::-webkit-scrollbar-thumb{background:var(--bo);border-radius:4px}
.snl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mt);padding:12px 16px 4px}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px;border:none;background:transparent;color:var(--mt);cursor:pointer;text-align:left;font-size:13px;font-family:inherit;font-weight:500;border-left:3px solid transparent;transition:.15s}.nb:hover{background:var(--bg);color:var(--tx)}.nb.act{color:var(--bl);background:var(--bl2);border-left-color:var(--bl);font-weight:600}.nb .ic{font-size:15px;flex-shrink:0}.nb .nl{flex:1}.nc{font-size:11px;font-weight:600;background:var(--gy);color:var(--mt);border-radius:20px;padding:1px 7px}.nb.act .nc{background:rgba(26,115,232,.15);color:var(--bl)}
main{flex:1;padding:22px;overflow-y:auto;min-width:0;max-width:calc(100vw - var(--sid-w) - 6px)}
#sidResize{width:6px;flex-shrink:0;cursor:col-resize;background:transparent;position:sticky;top:64px;height:calc(100vh - 64px);z-index:50;transition:background .15s}
#sidResize:hover,#sidResize.dragging{background:var(--bl2)}
#sidResize::after{content:'';position:absolute;left:2px;top:50%;transform:translateY(-50%);width:2px;height:36px;border-radius:2px;background:var(--bo);transition:background .15s}
#sidResize:hover::after,#sidResize.dragging::after{background:var(--bl)}
body.resizing{cursor:col-resize;user-select:none}
.her{border-radius:var(--ra);padding:20px 24px;margin-bottom:18px;display:flex;gap:16px;align-items:flex-start}.hb{background:linear-gradient(135deg,#e8f0fe,#d2e3fc);border:1px solid #c5d8fb}.hg{background:linear-gradient(135deg,#e6f4ea,#c8e6c9);border:1px solid #b5d8b8}.hico{font-size:28px;flex-shrink:0;margin-top:2px}.her h2{font-size:17px;font-weight:700;margin-bottom:5px}.her p{font-size:13px;color:var(--mt);line-height:1.6;max-width:640px}
.qs{background:var(--wh);border:1px solid var(--bo);border-radius:var(--ra);padding:16px 20px;margin-bottom:18px}.qs h3{font-size:13.5px;font-weight:700;margin-bottom:12px}.qss{display:flex;flex-wrap:wrap}.qst{display:flex;align-items:flex-start;gap:9px;padding:8px 16px 8px 0;flex:1;min-width:150px;position:relative}.qst:not(:last-child)::after{content:'›';position:absolute;right:2px;top:50%;transform:translateY(-50%);color:var(--bo);font-size:20px}.sn{width:24px;height:24px;background:var(--bl);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}.st strong{display:block;font-size:12px;font-weight:600;margin-bottom:1px}.st span{font-size:11px;color:var(--mt)}
.fb{background:var(--wh);border:1.5px solid var(--bo);border-radius:var(--ra);margin-bottom:18px;overflow:hidden}.fh{padding:16px 20px 13px;border-bottom:1px solid var(--bo);display:flex;align-items:flex-start;gap:12px}.fhi{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}.fhb{background:var(--bl2)}.fhg{background:var(--gl)}.fh h3{font-size:14px;font-weight:700;margin-bottom:3px}.fh p{font-size:12px;color:var(--mt);line-height:1.5}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr))}.fi{padding:13px 16px;border-bottom:1px solid var(--bo);border-right:1px solid var(--bo);cursor:pointer;transition:.12s}.fi:hover{background:var(--bg)}.fi.ex{background:var(--wh)!important}.fi-bdg{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.fi-t{font-size:13px;font-weight:600;margin-bottom:3px}.fi-n{font-size:10px;color:var(--mt);font-family:monospace;background:var(--gy);border-radius:4px;padding:1px 5px;display:inline-block;margin-bottom:3px}.fi-tip{font-size:11px;color:#b06000;margin-top:3px;line-height:1.4}.fi-prev{margin-top:9px;font-size:12px;color:var(--mt);background:var(--bg);border-radius:6px;padding:10px 12px;border-left:3px solid var(--bo);display:none;white-space:pre-wrap;line-height:1.75;word-break:break-word}.fi.ex .fi-prev{display:block}.fi-cb{margin-top:10px;display:none;background:var(--bl);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.1px}.fi-cb:hover{background:var(--bd)}.fi.ex .fi-cb{display:inline-flex;align-items:center;gap:5px}.fi-cb.ok{background:var(--gn)}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}.ch h2{font-size:18px;font-weight:700}.ch p{font-size:12px;color:var(--mt);margin-top:3px}.ch .cnt{background:var(--bl2);color:var(--bl);font-size:13px;font-weight:700;border-radius:20px;padding:5px 13px;flex-shrink:0;white-space:nowrap}
.tl{display:flex;flex-direction:column;gap:6px}.tc{background:var(--wh);border:1.5px solid var(--bo);border-radius:var(--ra);overflow:hidden;transition:.15s}.tc:hover{border-color:#bdc3ce;box-shadow:0 1px 4px rgba(0,0,0,.1)}.tc.op{border-color:var(--bl);box-shadow:0 0 0 3px rgba(26,115,232,.08)}
.th{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;min-height:56px}.bdg{flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.3px;border-radius:6px;padding:3px 8px;text-transform:uppercase;white-space:nowrap}.bj{background:#fce8e6;color:#c5221f;border:1px solid #f4c2c0}.bn{background:#fff8e1;color:#b06000;border:1px solid #ffe082}.bk{background:var(--pl);color:#7627c6;border:1px solid #d7b8f7}.bu{background:var(--gl);color:#176735;border:1px solid #b2dfba}
.tm{flex:1;min-width:0}.tt{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tcat{font-size:11px;color:var(--mt);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tn{font-size:10px;color:var(--mt);font-family:monospace;background:var(--gy);border-radius:4px;padding:1px 6px;white-space:nowrap;flex-shrink:0;max-width:185px;overflow:hidden;text-overflow:ellipsis}.chev{color:var(--mt);font-size:12px;flex-shrink:0;transition:.2s}.tc.op .chev{transform:rotate(180deg)}
.tb2{display:none;border-top:1px solid var(--bo)}.tc.op .tb2{display:block}.tmsg{padding:13px;position:relative}.mb{background:#f8fafb;border:1px solid var(--bo);border-radius:9px;padding:12px 48px 12px 13px;font-size:13px;line-height:1.75;color:var(--tx);white-space:pre-wrap;word-break:break-word}.cpb{position:absolute;top:21px;right:21px;background:var(--wh);border:1.5px solid var(--bo);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--mt);transition:.15s;display:flex;align-items:center;gap:4px}.cpb:hover{border-color:var(--bl);color:var(--bl);background:var(--bl2)}.cpb.ok{border-color:var(--gn);color:var(--gn);background:var(--gl)}.tip{margin:0 13px 13px;background:#fffbec;border:1px solid #ffe082;border-radius:7px;padding:8px 12px;font-size:11.5px;color:#7a5c00;line-height:1.6}
.sdiv{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mt);border-top:1px solid var(--bo);margin:16px 0 6px;padding-top:13px;display:flex;align-items:center;gap:8px}.sdiv .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sc{background:var(--bl2);color:var(--bl);border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.emp{text-align:center;padding:60px 20px;color:var(--mt)}.emp .ei{font-size:44px;margin-bottom:13px}.emp h3{font-size:16px;color:var(--tx);margin-bottom:6px}
.fi-chev{font-size:13px;color:var(--mt);transition:transform .2s;flex-shrink:0;display:inline-block}.fi.ex .fi-chev{transform:rotate(90deg);color:var(--bl)}
/* ACCORDION SIDEBAR */
.acc-item{overflow:hidden}
.acc-hdr{width:100%;display:flex;align-items:center;gap:8px;padding:8px 16px;border:none;background:transparent;color:var(--mt);cursor:pointer;text-align:left;font-size:13px;font-family:inherit;font-weight:500;border-left:3px solid transparent;transition:.15s}
.acc-hdr:hover{background:var(--bg);color:var(--tx)}
.acc-item.open .acc-hdr{color:var(--bl);background:var(--bl2);border-left-color:var(--bl);font-weight:600}
.acc-item.open .acc-hdr .nc{background:rgba(26,115,232,.15);color:var(--bl)}
.acc-item.act-cat .acc-hdr{box-shadow:inset 0 0 0 1px var(--bl)}
.acc-arrow{font-size:11px;color:var(--mt);transition:transform .2s;flex-shrink:0;margin-left:2px}
.acc-item.open .acc-arrow{transform:rotate(90deg);color:var(--bl)}
.acc-body{display:none;background:var(--bg);border-left:3px solid var(--bl2)}
.acc-item.open .acc-body{display:block}
/* Mini cards inside sidebar accordion */
.sid-card{padding:8px 14px 8px 18px;border-bottom:1px solid var(--bo);cursor:pointer;transition:.1s;position:relative}
.sid-card:hover{background:#eef3fd}
.sid-card:last-child{border-bottom:none}
.sid-card .sc-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;display:block}
.sid-card .sc-name{font-size:11.5px;font-weight:600;color:var(--tx);line-height:1.3;margin-bottom:2px}
.sid-card .sc-code{font-size:9.5px;color:var(--mt);font-family:monospace;background:var(--bo);border-radius:3px;padding:1px 4px}
.sid-card .sc-body{margin-top:7px;font-size:11.5px;color:var(--mt);white-space:pre-wrap;line-height:1.65;background:var(--wh);border-radius:6px;padding:8px 10px;border-left:3px solid var(--bl2);display:none;word-break:break-word}
.sid-card.open .sc-body{display:block}
.sid-card .sc-chev{position:absolute;right:10px;top:10px;font-size:10px;color:var(--mt);transition:transform .15s}
.sid-card.open .sc-chev{transform:rotate(90deg);color:var(--bl)}
.sid-card .sc-copy{margin-top:7px;display:none;background:var(--bl);color:#fff;border:none;border-radius:5px;padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.sid-card.open .sc-copy{display:inline-block}
.sid-card .sc-copy:hover{background:var(--bd)}
.sid-card .sc-copy.ok{background:var(--gn)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bo);border-radius:4px}
@media(max-width:860px){.lay{flex-direction:column}.sid{position:static;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--bo)}.fg{grid-template-columns:1fr}main{padding:14px;max-width:100%}#sidResize{display:none}}

/* ── LOGIN GATE ── */
#loginGate{position:fixed;inset:0;background:linear-gradient(135deg,#0d47a1 0%,#1a73e8 55%,#4285f4 100%);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--wh);border-radius:18px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.login-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--bl),var(--bd));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px;box-shadow:0 4px 16px rgba(26,115,232,.35)}
.login-box h1{font-size:19px;font-weight:800;color:var(--tx);margin-bottom:4px}
.login-box .lsub{font-size:13px;color:var(--mt);margin-bottom:26px}
.login-box input{width:100%;height:46px;border:1.5px solid var(--bo);border-radius:10px;padding:0 16px;font-size:15px;font-family:inherit;outline:none;transition:.2s;text-align:center;letter-spacing:.5px}
.login-box input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(26,115,232,.15)}
.login-box button{width:100%;height:46px;background:var(--bl);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;font-family:inherit;transition:.15s}
.login-box button:hover{background:var(--bd)}
.login-err{color:var(--rd);font-size:12.5px;margin-top:10px;display:none;font-weight:500}
.login-err.show{display:block}
.login-foot{font-size:11px;color:var(--mt);margin-top:22px}
#appRoot{display:none}

</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="loginGate">
  <div class="login-box">
    <div class="login-logo">🚀</div>
    <h1>GründerGPT</h1>
    <div class="lsub">WhatsApp Template Hub – Zugang nur für Kundenberater</div>
    <input type="password" id="pwInput" placeholder="Passwort eingeben" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Anmelden</button>
    <div class="login-err" id="pwErr">Falsches Passwort. Bitte erneut versuchen.</div>
    <div class="login-foot">🔒 Interner Bereich · Nicht weitergeben</div>
  </div>
</div>

<div id="appRoot">
<header class="tb">
  <div class="logo">
    <div class="li">🚀</div>
    <div><span class="lt">GründerGPT</span><span class="ls">WhatsApp Template Hub</span></div>
  </div>
  <div class="sb">
    <span class="si">🔍</span>
    <input type="text" id="si" placeholder="Template suchen – z.B. AVGS, Termin, Reaktivierung, No-Show…" oninput="handleSearch(this.value)">
    <button class="sx" id="sx" onclick="clearSearch()">✕</button>
  </div>
  <div class="tr">
    <span class="chip">145 Templates</span>
    <span class="ver">25 Kategorien · Juni 2026</span>
  </div>
</header>
<div class="lay">
<nav class="sid" id="sidebar">
  <!-- Guide (special, goes to main) -->
  <div class="snl">⭐ Kundenberater-Guide</div>
  <button class="nb act" onclick="goGuide()" id="nb-guide"><span class="ic">⭐</span><span class="nl">Chat-Öffner & Next Steps</span><span style="font-size:11px;margin-left:auto">→</span></button>

  <div class="snl" style="margin-top:6px">🔵 Erster Kontakt</div>
  <div class="acc-item" id="acc-erstkontakt">
    <button class="nb acc-hdr" onclick="toggleAcc('erstkontakt')"><span class="ic">👋</span><span class="nl">Erstkontakt</span><span class="nc" id="cnt-erstkontakt">11</span><span class="acc-arrow" id="arr-erstkontakt">▸</span></button>
    <div class="acc-body" id="body-erstkontakt"></div>
  </div>
  <div class="acc-item" id="acc-termin">
    <button class="nb acc-hdr" onclick="toggleAcc('termin')"><span class="ic">📅</span><span class="nl">Termin buchen / erinnern</span><span class="nc" id="cnt-termin">15</span><span class="acc-arrow" id="arr-termin">▸</span></button>
    <div class="acc-body" id="body-termin"></div>
  </div>
  <div class="acc-item" id="acc-noshow">
    <button class="nb acc-hdr" onclick="toggleAcc('noshow')"><span class="ic">🚫</span><span class="nl">No-Show / Abgesagt</span><span class="nc" id="cnt-noshow">5</span><span class="acc-arrow" id="arr-noshow">▸</span></button>
    <div class="acc-body" id="body-noshow"></div>
  </div>

  <div class="snl" style="margin-top:6px">🟢 Prozess</div>
  <div class="acc-item" id="acc-naechste">
    <button class="nb acc-hdr" onclick="toggleAcc('naechste')"><span class="ic">📋</span><span class="nl">Nächste Schritte</span><span class="nc" id="cnt-naechste">8</span><span class="acc-arrow" id="arr-naechste">▸</span></button>
    <div class="acc-body" id="body-naechste"></div>
  </div>
  <div class="acc-item" id="acc-avgs">
    <button class="nb acc-hdr" onclick="toggleAcc('avgs')"><span class="ic">🎓</span><span class="nl">AVGS-Prozess</span><span class="nc" id="cnt-avgs">9</span><span class="acc-arrow" id="arr-avgs">▸</span></button>
    <div class="acc-body" id="body-avgs"></div>
  </div>
  <div class="acc-item" id="acc-avgsfu">
    <button class="nb acc-hdr" onclick="toggleAcc('avgsfu')"><span class="ic">⏳</span><span class="nl">AVGS-Follow-up</span><span class="nc" id="cnt-avgsfu">10</span><span class="acc-arrow" id="arr-avgsfu">▸</span></button>
    <div class="acc-body" id="body-avgsfu"></div>
  </div>
  <div class="acc-item" id="acc-antrag">
    <button class="nb acc-hdr" onclick="toggleAcc('antrag')"><span class="ic">📝</span><span class="nl">Antrag & Bewilligung</span><span class="nc" id="cnt-antrag">9</span><span class="acc-arrow" id="arr-antrag">▸</span></button>
    <div class="acc-body" id="body-antrag"></div>
  </div>
  <div class="acc-item" id="acc-coaching">
    <button class="nb acc-hdr" onclick="toggleAcc('coaching')"><span class="ic">💼</span><span class="nl">Coaching & Businessplan</span><span class="nc" id="cnt-coaching">6</span><span class="acc-arrow" id="arr-coaching">▸</span></button>
    <div class="acc-body" id="body-coaching"></div>
  </div>

  <div class="snl" style="margin-top:6px">🟣 Follow-up</div>
  <div class="acc-item" id="acc-fup">
    <button class="nb acc-hdr" onclick="toggleAcc('fup')"><span class="ic">🔄</span><span class="nl">Status-Abfrage / FUP</span><span class="nc" id="cnt-fup">14</span><span class="acc-arrow" id="arr-fup">▸</span></button>
    <div class="acc-body" id="body-fup"></div>
  </div>
  <div class="acc-item" id="acc-reaktiv">
    <button class="nb acc-hdr" onclick="toggleAcc('reaktiv')"><span class="ic">💡</span><span class="nl">Reaktivierung</span><span class="nc" id="cnt-reaktiv">6</span><span class="acc-arrow" id="arr-reaktiv">▸</span></button>
    <div class="acc-body" id="body-reaktiv"></div>
  </div>
  <div class="acc-item" id="acc-verloren">
    <button class="nb acc-hdr" onclick="toggleAcc('verloren')"><span class="ic">🏁</span><span class="nl">Verlorener Lead</span><span class="nc" id="cnt-verloren">4</span><span class="acc-arrow" id="arr-verloren">▸</span></button>
    <div class="acc-body" id="body-verloren"></div>
  </div>

  <div class="snl" style="margin-top:6px">⚙️ Sonstiges</div>
  <div class="acc-item" id="acc-telefon">
    <button class="nb acc-hdr" onclick="toggleAcc('telefon')"><span class="ic">📞</span><span class="nl">Telefonkontakt</span><span class="nc" id="cnt-telefon">5</span><span class="acc-arrow" id="arr-telefon">▸</span></button>
    <div class="acc-body" id="body-telefon"></div>

    {id:"13",n:"14_02c_avgs_termin",cat:"AVGS-Prozess",col:"#1e8e3e",bc:"n",bl:"\u2192 N\u00e4chstes",tx:`Moin {{1}},
ein paar Punkte zur Orientierung für deinen Termin bei der AfA, wo insbesondere der angefragte AVGS-Gutschein besprochen wird:

•⁠ Du planst in die Selbständigkeit zu gehen, um nicht mehr arbeitslos zu sein

•⁠ ⁠Du brauchst eine konkrete Rückmeldung zu dem angefragten AVGS Gutschein (den du offiziell bei uns für ein Existenzgründercoaching einlöst)

•⁠ ⁠Manchmal wird versucht, dich alternativ an einen lokalen Bildungsträger zu vermitteln. Wenn du mit uns zusammenarbeiten willst, musst du dich klar dagegen aussprechen

•⁠ ⁠Den eigentlichen Antrag auf Gründungszuschuss musst du noch gar nicht aktiv ansprechen, auf Rückfrage kannst du sagen, das du den Antrag bald stellen willst

•⁠ Wir fragen immer erstmal einen größeren Gutschein an (falls der so nicht gewährt/abgelehnt wird, ist das kein Beinbruch. Gib uns direkt Bescheid, oft finden wir trotzdem eine Lösung)

•⁠ Wenn es gut läuft: Erfrage die direkte Mailadresse deiner Sachbearbeitung!

Melde dich gerne im Anschluss an den Termin hier bei uns`},

Für mögliche Fragen gerne immer diesen Kanal nutzen.

Beste Grüße
Markus

  {id:"13",n:"14_02c_avgs_termin",cat:"AVGS-Prozess",col:"#1e8e3e",bc:"n",bl:"\u2192 N\u00e4chstes",tx:`Moin {{1}},
ein paar Punkte zur Orientierung für deinen Termin bei der AfA, wo insbesondere der angefragte AVGS-Gutschein besprochen wird:

•⁠ Du planst in die Selbständigkeit zu gehen, um nicht mehr arbeitslos zu sein

•⁠ ⁠Du brauchst eine konkrete Rückmeldung zu dem angefragten AVGS Gutschein (den du offiziell bei uns für ein Existenzgründercoaching einlöst)

•⁠ ⁠Manchmal wird versucht, dich alternativ an einen lokalen Bildungsträger zu vermitteln. Wenn du mit uns zusammenarbeiten willst, musst du dich klar dagegen aussprechen

•⁠ ⁠Den eigentlichen Antrag auf Gründungszuschuss musst du noch gar nicht aktiv ansprechen, auf Rückfrage kannst du sagen, das du den Antrag bald stellen willst

•⁠ Wir fragen immer erstmal einen größeren Gutschein an (falls der so nicht gewährt/abgelehnt wird, ist das kein Beinbruch. Gib uns direkt Bescheid, oft finden wir trotzdem eine Lösung)

•⁠ Wenn es gut läuft: Erfrage die direkte Mailadresse deiner Sachbearbeitung!

Melde dich gerne im Anschluss an den Termin hier bei uns`,vk:"avgs"},

function renderAll(){

    html+=`<div class="tl">${cat.t.map(t=>renderCard({...t,cat:cat.l})).join('')}</div>`;

}

function tog(id){document.getElementById(id)?.classList.toggle('op');}
function togFi(id){document.getElementById(id)?.classList.toggle('ex');}

function cp(id){
  const txt=document.getElementById('mb'+id)?.innerText?.trim();
  if(!txt)return;
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById('cb'+id);
    b.textContent='✓ Kopiert!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='📋 Kopieren';b.classList.remove('ok');},2000);
  });
}
function cpFi(itemId,btnId,txt){
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById(btnId);
    b.textContent='✓ Kopiert!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='📋 Kopieren';b.classList.remove('ok');},2000);
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function handleSearch(q){
  const sx=document.getElementById('sx');
  sx.classList.toggle('v',q.length>0);
  if(!q.trim()){render(CUR);return;}
  const ql=q.toLowerCase();
  const hits=SD.filter(t=>[t.n,t.cat,t.tx].join(' ').toLowerCase().includes(ql));
  const mc=document.getElementById('mc');
  if(!hits.length){
    mc.innerHTML='<div class="emp"><div class="ei">🔍</div><h3>Kein Template gefunden</h3><p>Andere Begriffe versuchen – z.B. AVGS, Termin, Reaktivierung…</p></div>';
    return;
  }
  mc.innerHTML=`<div class="sc">🔍 ${hits.length} Ergebnis${hits.length!==1?'se':''} für <strong>${esc(q)}</strong></div>
    <div class="tl">${hits.map(t=>renderCard(t,true)).join('')}</div>`;
}
function clearSearch(){
  document.getElementById('si').value='';
  document.getElementById('sx').classList.remove('v');
  render(CUR);
}


// ── ACCORDION SIDEBAR ──
const OPEN_ACCS = new Set();

function toggleAcc(key) {
  const item = document.getElementById('acc-' + key);
  if (!item) return;

  if (OPEN_ACCS.has(key)) {
    // Close
    OPEN_ACCS.delete(key);
    item.classList.remove('open');
  } else {
    // Open — lazy-render mini cards if not yet rendered
    OPEN_ACCS.add(key);
    item.classList.add('open');
    renderAccBody(key);
  }
  // Deactivate the guide button when using accordions
  document.getElementById('nb-guide')?.classList.remove('act');
  // Mark this accordion as the active one (highlight) and show full view on the right
  document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('act-cat'));
  if (OPEN_ACCS.has(key)) {
    item.classList.add('act-cat');
    CUR = key;
    render(key);
  }
}

function renderAccBody(key) {
  const body = document.getElementById('body-' + key);
  if (!body || body.dataset.rendered) return;
  body.dataset.rendered = '1';

  const v = VIEWS[key];
  if (!v || !v.t) return;

  body.innerHTML = v.t.map((t, i) => {
    const bc = t.bc || 'n';
    const bl = t.bl || '→ Nächstes';
    const badgeColor = {j:'#c5221f',n:'#b06000',k:'#7627c6',u:'#176735'}[bc] || '#5f6368';
    const cardId = 'sc-' + key + '-' + i;
    return `<div class="sid-card" id="${cardId}" onclick="togSidCard('${cardId}')">
      <span class="sc-chev">▸</span>
      <span class="sc-badge" style="color:${badgeColor}">${bl}</span>
      <div class="sc-name">${t.n.replace(/_/g,' ')}</div>
      <span class="sc-code">${t.n}</span>
      <div class="sc-body" id="scb-${cardId}">${escSid(t.tx)}</div>
      <button class="sc-copy" id="scc-${cardId}" onclick="event.stopPropagation();cpSid('${cardId}')">📋 Kopieren</button>
    </div>`;
  }).join('');
}

function togSidCard(id) {
  // Toggle — multiple can be open
  const card = document.getElementById(id);
  if (!card) return;
  card.classList.toggle('open');
}

function cpSid(cardId) {
  const txt = document.getElementById('scb-' + cardId)?.innerText?.trim();
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('scc-' + cardId);
    if (btn) { btn.textContent = '✓ Kopiert!'; btn.classList.add('ok'); }
    setTimeout(() => { if (btn) { btn.textContent = '📋 Kopieren'; btn.classList.remove('ok'); } }, 2000);
  });
}

function escSid(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function goGuide() {
  // Collapse all accordions
  OPEN_ACCS.forEach(key => {
    document.getElementById('acc-' + key)?.classList.remove('open');
  });
  OPEN_ACCS.clear();
  document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('act-cat'));
  document.getElementById('nb-guide')?.classList.add('act');
  render('guide');
}

// Override go() for guide view — other views now handled by accordion
function go(k) {
  if (k === 'guide') { goGuide(); return; }
  if (k === 'alle') {
    document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('open','act-cat'));
    OPEN_ACCS.clear();
    document.getElementById('nb-guide')?.classList.remove('act');
    const mc = document.getElementById('mc');
    mc.innerHTML = renderAll();
    return;
  }
  toggleAcc(k);
}


// ── SIDEBAR RESIZE (Drag) ──
(function(){
  const handle = document.getElementById('sidResize');
  if(!handle) return;
  const MIN_W = 260, MAX_W = 640;
  let dragging = false, startX = 0, startW = 0;

  function getCurrentW(){
    const v = getComputedStyle(document.documentElement).getPropertyValue('--sid-w').trim();
    return parseInt(v) || 300;
  }

  handle.addEventListener('mousedown', function(e){
    dragging = true;
    startX = e.clientX;
    startW = getCurrentW();
    handle.classList.add('dragging');
    document.body.classList.add('resizing');
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e){
    if(!dragging) return;
    let newW = startW + (e.clientX - startX);
    newW = Math.max(MIN_W, Math.min(MAX_W, newW));
    document.documentElement.style.setProperty('--sid-w', newW + 'px');
  });

  document.addEventListener('mouseup', function(){
    if(!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.classList.remove('resizing');
    try{ localStorage.setItem('gpt_sid_w', getCurrentW()); }catch(e){}
  });

  try{
    const saved = localStorage.getItem('gpt_sid_w');
    if(saved){
      const w = Math.max(MIN_W, Math.min(MAX_W, parseInt(saved)));
      document.documentElement.style.setProperty('--sid-w', w + 'px');
    }
  }catch(e){}
})();

goGuide();
</script>
